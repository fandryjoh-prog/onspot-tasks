<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnSpot Tasks</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f0f;
  --surface:#1a1a1a;
  --surface2:#222;
  --border:#2a2a2a;
  --border2:#333;
  --text:#f0f0ee;
  --text2:#888;
  --text3:#555;
  --accent:#4ade80;
  --accent-dim:#1a3a24;
  --red:#f87171;
  --red-dim:#3a1a1a;
  --amber:#fbbf24;
  --amber-dim:#3a2a00;
  --blue:#60a5fa;
  --blue-dim:#1a2a3a;
  --radius:10px;
  --font:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}

body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* LOGIN */
#login-screen{
  position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;
}
.login-card{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:340px;
}
.login-logo{font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.login-title{font-size:24px;font-weight:600;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:32px}
.avatars{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px}
.avatar-btn{
  padding:12px;border:1px solid var(--border2);border-radius:10px;background:transparent;cursor:pointer;
  color:var(--text);font-family:var(--font);font-size:13px;display:flex;align-items:center;gap:10px;
  transition:all .15s;
}
.avatar-btn:hover{border-color:var(--accent);background:var(--accent-dim)}
.avatar-btn.selected{border-color:var(--accent);background:var(--accent-dim)}
.avatar-icon{
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:600;flex-shrink:0;
}
.pin-label{font-size:12px;color:var(--text2);margin-bottom:8px}
.pin-input{
  width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;
  color:var(--text);font-family:var(--mono);font-size:16px;letter-spacing:6px;text-align:center;
  outline:none;transition:border-color .15s;
}
.pin-input:focus{border-color:var(--accent)}
.login-btn{
  width:100%;margin-top:16px;padding:11px;background:var(--accent);color:#000;border:none;border-radius:8px;
  font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;
}
.login-btn:hover{opacity:.85}
.login-btn:disabled{opacity:.4;cursor:not-allowed}
.login-error{font-size:12px;color:var(--red);margin-top:8px;text-align:center;min-height:18px}

/* APP */
#app{display:none}
.topbar{
  height:52px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:50;
}
.topbar-logo{font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent)}
.topbar-sep{color:var(--border2);font-size:18px}
.topbar-title{font-size:14px;color:var(--text2)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.user-pill{
  display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:99px;
  background:var(--surface2);border:1px solid var(--border2);font-size:12px;
}
.btn{
  padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:var(--font);
  font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:all .15s;
}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{color:var(--text);border-color:var(--border)}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid transparent}
.btn-danger:hover{border-color:var(--red)}

/* TABS */
.tabs{display:flex;gap:2px;padding:16px 20px 0;border-bottom:1px solid var(--border)}
.tab{
  padding:8px 16px;border-radius:8px 8px 0 0;font-size:13px;font-weight:500;cursor:pointer;
  color:var(--text2);border:1px solid transparent;border-bottom:none;transition:all .15s;
  background:transparent;font-family:var(--font);
}
.tab.active{background:var(--surface);color:var(--text);border-color:var(--border)}
.tab:hover:not(.active){color:var(--text)}

/* CONTENT */
.content{padding:20px}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.filter-select{
  padding:6px 10px;background:var(--surface);border:1px solid var(--border2);border-radius:7px;
  color:var(--text);font-family:var(--font);font-size:13px;outline:none;cursor:pointer;
}
.search-input{
  padding:6px 12px;background:var(--surface);border:1px solid var(--border2);border-radius:7px;
  color:var(--text);font-family:var(--font);font-size:13px;outline:none;width:200px;
}
.search-input:focus,.filter-select:focus{border-color:var(--accent)}
.count-badge{
  font-size:11px;padding:2px 8px;border-radius:99px;background:var(--surface2);
  color:var(--text2);font-family:var(--mono);
}

/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:start}
.kanban-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.kanban-header{
  padding:12px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);
}
.kanban-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.kanban-col-title{font-size:13px;font-weight:500}
.kanban-col-count{font-size:11px;color:var(--text2);font-family:var(--mono);margin-left:auto}
.kanban-cards{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:80px}
.kanban-add{
  width:100%;padding:8px;background:transparent;border:1px dashed var(--border2);border-radius:8px;
  color:var(--text3);font-family:var(--font);font-size:12px;cursor:pointer;transition:all .15s;
}
.kanban-add:hover{border-color:var(--accent);color:var(--accent)}

/* TASK CARD */
.task-card{
  background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:12px;
  cursor:pointer;transition:all .15s;
}
.task-card:hover{border-color:var(--border);background:#252525}
.task-card-title{font-size:13px;font-weight:500;margin-bottom:8px;line-height:1.4}
.task-card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.priority-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tag{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500}
.tag-red{background:var(--red-dim);color:var(--red)}
.tag-amber{background:var(--amber-dim);color:var(--amber)}
.tag-blue{background:var(--blue-dim);color:var(--blue)}
.tag-green{background:var(--accent-dim);color:var(--accent)}
.tag-gray{background:var(--surface);color:var(--text2)}
.assignee-avatar{
  width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;flex-shrink:0;margin-left:auto;
}
.due-date{font-size:11px;color:var(--text2);font-family:var(--mono)}
.due-overdue{color:var(--red)}

/* LIST VIEW */
.task-list{display:flex;flex-direction:column;gap:1px}
.task-row{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;
  margin-bottom:4px;
}
.task-row:hover{border-color:var(--border2);background:var(--surface2)}
.task-row-check{
  width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border2);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer;
}
.task-row-check.done{background:var(--accent);border-color:var(--accent);color:#000}
.task-row-title{flex:1;font-size:13px}
.task-row-title.done{text-decoration:line-through;color:var(--text3)}
.task-row-right{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;
  align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);
}
.modal{
  background:var(--surface);border:1px solid var(--border2);border-radius:14px;
  width:100%;max-width:520px;max-height:90vh;overflow-y:auto;
}
.modal-header{
  padding:20px 24px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-title{font-size:16px;font-weight:600}
.modal-close{
  background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:20px;
  line-height:1;padding:4px;border-radius:4px;
}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.form-row{margin-bottom:16px}
.form-label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}
.form-input,.form-select,.form-textarea{
  width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border2);
  border-radius:8px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;
  transition:border-color .15s;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-textarea{resize:vertical;min-height:80px;line-height:1.5}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* EMPTY STATE */
.empty{padding:48px;text-align:center;color:var(--text3);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:.4}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:26px;font-weight:600;font-family:var(--mono)}
.stat-sub{font-size:11px;color:var(--text2);margin-top:4px}

.hidden{display:none!important}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">OnSpot</div>
    <div class="login-title">Task Manager</div>
    <div class="login-sub">Choisis ton profil et entre ton PIN</div>
    <div class="avatars" id="avatar-list"></div>
    <div class="pin-label">PIN (4 chiffres)</div>
    <input class="pin-input" type="password" id="pin-input" maxlength="4" placeholder="••••" inputmode="numeric">
    <div class="login-error" id="login-error"></div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">Se connecter</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">OnSpot</div>
    <div class="topbar-sep">/</div>
    <div class="topbar-title">Tasks</div>
    <div class="topbar-right">
      <div class="user-pill">
        <div class="assignee-avatar" id="topbar-avatar" style="width:22px;height:22px;font-size:9px"></div>
        <span id="topbar-name"></span>
      </div>
      <button class="btn btn-primary" onclick="openModal()">+ Nouvelle tâche</button>
      <button class="btn btn-ghost" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('kanban',this)">Kanban</button>
    <button class="tab" onclick="switchTab('list',this)">Liste</button>
    <button class="tab" onclick="switchTab('stats',this)">Statistiques</button>
  </div>

  <div class="content">
    <div class="toolbar">
      <select class="filter-select" id="filter-assignee" onchange="renderAll()">
        <option value="">Tous les agents</option>
      </select>
      <select class="filter-select" id="filter-priority" onchange="renderAll()">
        <option value="">Toutes priorités</option>
        <option value="high">Haute</option>
        <option value="medium">Moyenne</option>
        <option value="low">Basse</option>
      </select>
      <input class="search-input" id="search-input" placeholder="Rechercher..." oninput="renderAll()">
      <span class="count-badge" id="task-count">0 tâches</span>
    </div>

    <!-- KANBAN -->
    <div id="view-kanban">
      <div class="kanban">
        <div class="kanban-col">
          <div class="kanban-header">
            <div class="kanban-dot" style="background:#888"></div>
            <div class="kanban-col-title">À faire</div>
            <div class="kanban-col-count" id="count-todo">0</div>
          </div>
          <div class="kanban-cards" id="col-todo"></div>
          <div style="padding:0 10px 10px">
            <button class="kanban-add" onclick="openModal('todo')">+ Ajouter</button>
          </div>
        </div>
        <div class="kanban-col">
          <div class="kanban-header">
            <div class="kanban-dot" style="background:var(--amber)"></div>
            <div class="kanban-col-title">En cours</div>
            <div class="kanban-col-count" id="count-doing">0</div>
          </div>
          <div class="kanban-cards" id="col-doing"></div>
          <div style="padding:0 10px 10px">
            <button class="kanban-add" onclick="openModal('doing')">+ Ajouter</button>
          </div>
        </div>
        <div class="kanban-col">
          <div class="kanban-header">
            <div class="kanban-dot" style="background:var(--accent)"></div>
            <div class="kanban-col-title">Terminé</div>
            <div class="kanban-col-count" id="count-done">0</div>
          </div>
          <div class="kanban-cards" id="col-done"></div>
          <div style="padding:0 10px 10px">
            <button class="kanban-add" onclick="openModal('done')">+ Ajouter</button>
          </div>
        </div>
      </div>
    </div>

    <!-- LIST -->
    <div id="view-list" class="hidden">
      <div class="task-list" id="list-container"></div>
    </div>

    <!-- STATS -->
    <div id="view-stats" class="hidden">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total tâches</div>
          <div class="stat-value" id="s-total">0</div>
          <div class="stat-sub">toutes statuts</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">En cours</div>
          <div class="stat-value" id="s-doing" style="color:var(--amber)">0</div>
          <div class="stat-sub">en progression</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Terminées</div>
          <div class="stat-value" id="s-done" style="color:var(--accent)">0</div>
          <div class="stat-sub">complétées</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">En retard</div>
          <div class="stat-value" id="s-overdue" style="color:var(--red)">0</div>
          <div class="stat-sub">date dépassée</div>
        </div>
      </div>
      <div id="stats-by-agent"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Nouvelle tâche</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label class="form-label">Titre *</label>
        <input class="form-input" id="f-title" placeholder="Titre de la tâche">
      </div>
      <div class="form-row">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="f-desc" placeholder="Détails optionnels..."></textarea>
      </div>
      <div class="form-grid">
        <div class="form-row">
          <label class="form-label">Assigné à</label>
          <select class="form-select" id="f-assignee"></select>
        </div>
        <div class="form-row">
          <label class="form-label">Priorité</label>
          <select class="form-select" id="f-priority">
            <option value="low">Basse</option>
            <option value="medium" selected>Moyenne</option>
            <option value="high">Haute</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label">Statut</label>
          <select class="form-select" id="f-status">
            <option value="todo">À faire</option>
            <option value="doing">En cours</option>
            <option value="done">Terminé</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label">Échéance</label>
          <input class="form-input" type="date" id="f-due">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger hidden" id="delete-btn" onclick="deleteTask()">Supprimer</button>
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveTask()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
const FIREBASE_PROJECT_ID = "trackingcallro";
const FIREBASE_API_KEY = "AIzaSyD1Weyc2zdtdaO7JgrMRskXZaDOGTIbyqc";
const BASE_URL = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/databases/(default)/documents`;

const TEAM = [
  { id:'patrick', name:'Patrick', pin:'1111', color:'#4ade80', initials:'PK' },
  { id:'gaelle',  name:'Gaelle',  pin:'2222', color:'#60a5fa', initials:'GN' },
  { id:'johnr',   name:'John R.', pin:'3333', color:'#fbbf24', initials:'JR' },
  { id:'crystella',name:'Crystella',pin:'4444',color:'#f87171',initials:'CR' },
  { id:'john',    name:'John (moi)', pin:'5555', color:'#c084fc', initials:'JF' },
];

let currentUser = null;
let tasks = [];
let editingId = null;
let currentView = 'kanban';

// ===== LOGIN =====
function renderAvatars() {
  const container = document.getElementById('avatar-list');
  container.innerHTML = TEAM.map(u => `
    <button class="avatar-btn" onclick="selectUser('${u.id}')" id="av-${u.id}">
      <div class="avatar-icon" style="background:${u.color}20;color:${u.color}">${u.initials}</div>
      <span>${u.name}</span>
    </button>
  `).join('');
}

let selectedUserId = null;
function selectUser(id) {
  selectedUserId = id;
  document.querySelectorAll('.avatar-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('av-' + id).classList.add('selected');
  document.getElementById('pin-input').focus();
}

function doLogin() {
  const pin = document.getElementById('pin-input').value;
  const err = document.getElementById('login-error');
  if (!selectedUserId) { err.textContent = 'Choisis ton profil.'; return; }
  const user = TEAM.find(u => u.id === selectedUserId && u.pin === pin);
  if (!user) { err.textContent = 'PIN incorrect.'; return; }
  currentUser = user;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  const av = document.getElementById('topbar-avatar');
  av.textContent = user.initials;
  av.style.background = user.color + '20';
  av.style.color = user.color;
  document.getElementById('topbar-name').textContent = user.name;
  populateAssigneeFilters();
  loadTasks();
}

document.getElementById('pin-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function logout() {
  currentUser = null;
  selectedUserId = null;
  tasks = [];
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pin-input').value = '';
  document.getElementById('login-error').textContent = '';
  document.querySelectorAll('.avatar-btn').forEach(b => b.classList.remove('selected'));
}

// ===== FILTERS =====
function populateAssigneeFilters() {
  const sel = document.getElementById('filter-assignee');
  const fSel = document.getElementById('f-assignee');
  const opts = TEAM.map(u => `<option value="${u.id}">${u.name}</option>`).join('');
  sel.innerHTML = '<option value="">Tous les agents</option>' + opts;
  fSel.innerHTML = opts;
}

// ===== FIRESTORE =====
async function loadTasks() {
  try {
    const res = await fetch(`${BASE_URL}/tasks?key=${FIREBASE_API_KEY}`);
    const data = await res.json();
    tasks = (data.documents || []).map(docToTask);
    renderAll();
  } catch(e) { console.error('Erreur chargement:', e); }
}

function docToTask(doc) {
  const f = doc.fields || {};
  return {
    id: doc.name.split('/').pop(),
    title: f.title?.stringValue || '',
    desc: f.desc?.stringValue || '',
    assignee: f.assignee?.stringValue || '',
    priority: f.priority?.stringValue || 'medium',
    status: f.status?.stringValue || 'todo',
    due: f.due?.stringValue || '',
    createdBy: f.createdBy?.stringValue || '',
    createdAt: f.createdAt?.stringValue || '',
  };
}

async function saveToFirestore(task) {
  const docId = task.id;
  const body = {
    fields: {
      title: { stringValue: task.title },
      desc: { stringValue: task.desc },
      assignee: { stringValue: task.assignee },
      priority: { stringValue: task.priority },
      status: { stringValue: task.status },
      due: { stringValue: task.due },
      createdBy: { stringValue: task.createdBy },
      createdAt: { stringValue: task.createdAt },
    }
  };
  await fetch(`${BASE_URL}/tasks/${docId}?key=${FIREBASE_API_KEY}`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
}

async function deleteFromFirestore(id) {
  await fetch(`${BASE_URL}/tasks/${id}?key=${FIREBASE_API_KEY}`, { method: 'DELETE' });
}

// ===== RENDER =====
function getFilteredTasks() {
  const assignee = document.getElementById('filter-assignee').value;
  const priority = document.getElementById('filter-priority').value;
  const search = document.getElementById('search-input').value.toLowerCase();
  return tasks.filter(t =>
    (!assignee || t.assignee === assignee) &&
    (!priority || t.priority === priority) &&
    (!search || t.title.toLowerCase().includes(search) || t.desc.toLowerCase().includes(search))
  );
}

function renderAll() {
  const filtered = getFilteredTasks();
  document.getElementById('task-count').textContent = filtered.length + ' tâche' + (filtered.length !== 1 ? 's' : '');
  if (currentView === 'kanban') renderKanban(filtered);
  else if (currentView === 'list') renderList(filtered);
  else renderStats(filtered);
}

function priorityTag(p) {
  if (p === 'high') return '<span class="tag tag-red">Haute</span>';
  if (p === 'medium') return '<span class="tag tag-amber">Moyenne</span>';
  return '<span class="tag tag-gray">Basse</span>';
}

function priorityDot(p) {
  const c = p === 'high' ? 'var(--red)' : p === 'medium' ? 'var(--amber)' : 'var(--text3)';
  return `<div class="priority-dot" style="background:${c}"></div>`;
}

function assigneeAvatar(id, size=20) {
  const u = TEAM.find(t => t.id === id);
  if (!u) return '';
  return `<div class="assignee-avatar" style="width:${size}px;height:${size}px;background:${u.color}20;color:${u.color}">${u.initials}</div>`;
}

function fmtDue(due) {
  if (!due) return '';
  const d = new Date(due);
  const now = new Date(); now.setHours(0,0,0,0);
  const isOverdue = d < now;
  const str = d.toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit'});
  return `<span class="due-date ${isOverdue ? 'due-overdue' : ''}">${str}</span>`;
}

function renderKanban(filtered) {
  const cols = { todo: [], doing: [], done: [] };
  filtered.forEach(t => { if (cols[t.status]) cols[t.status].push(t); });
  Object.entries(cols).forEach(([status, list]) => {
    const el = document.getElementById('col-' + status);
    document.getElementById('count-' + status).textContent = list.length;
    if (!list.length) {
      el.innerHTML = '<div class="empty" style="padding:20px;font-size:12px">Aucune tâche</div>';
      return;
    }
    el.innerHTML = list.map(t => `
      <div class="task-card" onclick="openModal(null,'${t.id}')">
        <div class="task-card-title">${t.title}</div>
        <div class="task-card-meta">
          ${priorityDot(t.priority)}
          ${priorityTag(t.priority)}
          ${fmtDue(t.due)}
          ${assigneeAvatar(t.assignee)}
        </div>
      </div>
    `).join('');
  });
}

function renderList(filtered) {
  const el = document.getElementById('list-container');
  if (!filtered.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>Aucune tâche trouvée</div>'; return; }
  el.innerHTML = filtered.map(t => `
    <div class="task-row" onclick="openModal(null,'${t.id}')">
      <div class="task-row-check ${t.status==='done'?'done':''}" onclick="toggleDone(event,'${t.id}')">
        ${t.status==='done'?'✓':''}
      </div>
      <div class="task-row-title ${t.status==='done'?'done':''}">${t.title}</div>
      <div class="task-row-right">
        ${priorityTag(t.priority)}
        ${fmtDue(t.due)}
        ${assigneeAvatar(t.assignee)}
      </div>
    </div>
  `).join('');
}

function renderStats(filtered) {
  const total = filtered.length;
  const doing = filtered.filter(t => t.status==='doing').length;
  const done = filtered.filter(t => t.status==='done').length;
  const now = new Date(); now.setHours(0,0,0,0);
  const overdue = filtered.filter(t => t.due && new Date(t.due) < now && t.status !== 'done').length;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-doing').textContent = doing;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-overdue').textContent = overdue;

  const byAgent = TEAM.map(u => ({
    ...u,
    todo: filtered.filter(t => t.assignee===u.id && t.status==='todo').length,
    doing: filtered.filter(t => t.assignee===u.id && t.status==='doing').length,
    done: filtered.filter(t => t.assignee===u.id && t.status==='done').length,
  })).filter(u => u.todo+u.doing+u.done > 0);

  document.getElementById('stats-by-agent').innerHTML = `
    <div style="font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">Par agent</div>
    ${byAgent.map(u => `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px">
        ${assigneeAvatar(u.id, 32)}
        <div style="font-weight:500;font-size:13px;min-width:100px">${u.name}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <span class="tag tag-gray">À faire: ${u.todo}</span>
          <span class="tag tag-amber">En cours: ${u.doing}</span>
          <span class="tag tag-green">Terminé: ${u.done}</span>
        </div>
      </div>
    `).join('')}
  `;
}

// ===== MODAL =====
function openModal(defaultStatus = null, taskId = null) {
  editingId = taskId;
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.remove('hidden');
  document.getElementById('modal-title').textContent = taskId ? 'Modifier la tâche' : 'Nouvelle tâche';
  document.getElementById('delete-btn').classList.toggle('hidden', !taskId);

  if (taskId) {
    const t = tasks.find(t => t.id === taskId);
    if (t) {
      document.getElementById('f-title').value = t.title;
      document.getElementById('f-desc').value = t.desc;
      document.getElementById('f-assignee').value = t.assignee;
      document.getElementById('f-priority').value = t.priority;
      document.getElementById('f-status').value = t.status;
      document.getElementById('f-due').value = t.due;
    }
  } else {
    document.getElementById('f-title').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-assignee').value = currentUser.id;
    document.getElementById('f-priority').value = 'medium';
    document.getElementById('f-status').value = defaultStatus || 'todo';
    document.getElementById('f-due').value = '';
  }
  document.getElementById('f-title').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  editingId = null;
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

async function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('Le titre est requis.'); return; }
  const task = {
    id: editingId || Date.now().toString(),
    title,
    desc: document.getElementById('f-desc').value,
    assignee: document.getElementById('f-assignee').value,
    priority: document.getElementById('f-priority').value,
    status: document.getElementById('f-status').value,
    due: document.getElementById('f-due').value,
    createdBy: currentUser.id,
    createdAt: editingId ? (tasks.find(t=>t.id===editingId)?.createdAt || new Date().toISOString()) : new Date().toISOString(),
  };
  if (editingId) { const i = tasks.findIndex(t=>t.id===editingId); if(i>=0) tasks[i]=task; }
  else tasks.push(task);
  closeModal();
  renderAll();
  await saveToFirestore(task);
}

async function deleteTask() {
  if (!editingId) return;
  if (!confirm('Supprimer cette tâche ?')) return;
  tasks = tasks.filter(t => t.id !== editingId);
  const id = editingId;
  closeModal();
  renderAll();
  await deleteFromFirestore(id);
}

async function toggleDone(e, id) {
  e.stopPropagation();
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.status = t.status === 'done' ? 'todo' : 'done';
  renderAll();
  await saveToFirestore(t);
}

// ===== TABS =====
function switchTab(view, btn) {
  currentView = view;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-kanban').classList.toggle('hidden', view !== 'kanban');
  document.getElementById('view-list').classList.toggle('hidden', view !== 'list');
  document.getElementById('view-stats').classList.toggle('hidden', view !== 'stats');
  renderAll();
}

// ===== INIT =====
renderAvatars();
</script>
</body>
</html>
